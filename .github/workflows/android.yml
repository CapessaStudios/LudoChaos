name: Build Android (APK + AAB Signed)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Java 21 (Obrigatório para versões recentes do Capacitor/Android)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 4. Instalar dependências
      - name: Install dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install @capacitor/assets

      # 5. Preparar web assets (Garante que a pasta existe antes do Capacitor)
      - name: Prepare web assets
        run: |
          mkdir -p www
          cp -r index.html www/ || true
          cp -r css www/ || true
          cp -r js www/ || true
          cp -r assets www/ || true

      # 6. Capacitor init seguro (só corre se não existir o ficheiro de configuração)
      - name: Init Capacitor
        run: |
          if [ ! -f "capacitor.config.json" ]; then
            npx cap init "LudoChaos" "com.capessastudios.ludochaos" --web-dir="www"
          fi

      # 7. Forçar recriação da pasta Android para garantir o gradlew
      - name: Add Android Platform
        run: |
          rm -rf android
          npx cap add android

      # 8. Sync Capacitor
      - name: Sync Capacitor
        run: npx cap sync android

      # 9. ÍCONES (Só corre se o ficheiro base existir para não quebrar o fluxo)
      - name: Generate Android Icons
        run: |
          if [ -f "resources/icon.png" ]; then
            npx @capacitor/assets generate --icon resources/icon.png
          else
            echo "Aviso: resources/icon.png não encontrado. Usando ícones padrão."
          fi

      # 10. KEYS (assinatura)
      - name: Restore Keystore
        run: |
          mkdir -p android/app/keystore
          if [ -d "keystores" ]; then
            cp keystores/capessastudios-ludochaos.keystore android/app/keystore/release.keystore
          else
            echo "Aviso: Pasta keystores não encontrada!"
          fi

      # 11. key.properties
      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storeFile=app/keystore/release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # 12. Compilação Completa (Debug, Release e AAB)
      - name: Build APKs and AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      # 13. Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LudoChaos-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # 14. Upload Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: LudoChaos-Release-APK
          path: android/app/build/outputs/apk/release/app-release.apk

      # 15. Upload AAB (PLAY STORE)
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: LudoChaos-PlayStore-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
