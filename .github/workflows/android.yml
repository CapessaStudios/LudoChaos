name: Build Android (APK + AAB Signed)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Java (estável para Capacitor)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 4. Instalar dependências
      - name: Install dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install @capacitor/assets

      # 5. Preparar web assets
      - name: Prepare web assets
        run: |
          mkdir -p www
          cp -r index.html www/ || true
          cp -r css www/ || true
          cp -r js www/ || true
          cp -r assets www/ || true

      # 6. Capacitor init seguro
      - name: Init Capacitor
        run: |
          npx cap init "LudoChaos" "com.capessastudios.ludochaos" --web-dir="www" || true

      # 7. Criar Android (se não existir)
      - name: Add Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      # 8. Sync Capacitor
      - name: Sync Capacitor
        run: npx cap sync android

      # 9. 🔥 ÍCONE CORRETO (IMPORTANTE)
      - name: Generate Android Icons
        run: |
          npx @capacitor/assets generate \
            --icon resources/icon.png || true

      # 10. KEYS (assinatura)
      - name: Restore Keystore
        run: |
          mkdir -p android/app/keystore
          cp keystores/capessastudios-ludochaos.keystore android/app/keystore/release.keystore

      # 11. key.properties
      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storeFile=app/keystore/release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # 12. Build Debug APK
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 13. Build Release APK
      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      # 14. Build AAB (Play Store)
      - name: Build Release AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      # 15. Upload Debug
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LudoChaos-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # 16. Upload Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: LudoChaos-Release-APK
          path: android/app/build/outputs/apk/release/app-release.apk

      # 17. Upload AAB (PLAY STORE)
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: LudoChaos-PlayStore-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
