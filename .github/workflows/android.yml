name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Java 21
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 4. Instalar dependências Capacitor
      - name: Install dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      # 5. Garantir estrutura web (IMPORTANTE)
      - name: Prepare web assets
        run: |
          mkdir -p www
          cp -r index.html www/ || true
          cp -r css www/ || true
          cp -r js www/ || true
          cp -r assets www/ || true

      # 6. Inicializar Capacitor (só se não existir)
      - name: Init Capacitor
        run: |
          if [ ! -f "capacitor.config.json" ]; then
            npx cap init "LudoChaos" "com.capessastudios.ludochaos" --web-dir="www"
          fi

      # 7. Criar Android (se não existir)
      - name: Setup Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      # 8. 🔥 Sync obrigatório ANTES do build
      - name: Sync Capacitor
        run: npx cap sync android

      # 9. Build APK Debug
      - name: Build APK Debug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 10. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LudoChaos-APK-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
