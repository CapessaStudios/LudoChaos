name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Java 21
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 4. Instalar dependências
      - name: Install dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install @capacitor/assets

      # 5. Gerar ícones Android
      - name: Generate Android Icons
        run: |
          npx capacitor-assets generate || true

      # 6. Preparar assets
      - name: Prepare web assets
        run: |
          mkdir -p www
          cp -r index.html www/ || true
          cp -r css www/ || true
          cp -r js www/ || true
          cp -r assets www/ || true

      # 7. Init Capacitor
      - name: Init Capacitor
        run: |
          if [ ! -f "capacitor.config.json" ]; then
            npx cap init "LudoChaos" "com.capessastudios.ludochaos" --web-dir="www"
          fi

      # 8. Setup Android
      - name: Setup Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      # 9. Sync Capacitor
      - name: Sync Capacitor
        run: npx cap sync android

      # 10. 🔐 Restore Keystore
      - name: Restore Keystore
        run: |
          mkdir -p android/app/keystore
          cp keystores/capessastudios-ludochaos.keystore android/app/keystore/release.keystore

      # 11. 🔐 Create key.properties
      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storeFile=app/keystore/release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # 12. Build Debug APK
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 13. 🔥 Build Release (ASSINADO)
      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      # 14. Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LudoChaos-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # 15. Upload Release APK (ASSINADO)
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: LudoChaos-Release
          path: android/app/build/outputs/apk/release/app-release.apk
