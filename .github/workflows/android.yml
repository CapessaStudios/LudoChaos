name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Java 17 (OBRIGATÓRIO)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 4. Forçar Gradle a usar Java 17
      - name: Force Gradle Java 17
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties || true

      # 5. Instalar dependências Capacitor
      - name: Install dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      # 6. Preparar web assets
      - name: Prepare web assets
        run: |
          mkdir -p www
          cp -r index.html www/ || true
          cp -r css www/ || true
          cp -r js www/ || true
          cp -r assets www/ || true

      # 7. Garantir config Capacitor
      - name: Init Capacitor
        run: |
          if [ ! -f "capacitor.config.json" ]; then
            npx cap init "LudoChaos" "com.capessastudios.ludochaos" --web-dir="www"
          fi

      # 8. Reset total do Android (evita gradlew missing)
      - name: Reset Android project
        run: |
          rm -rf android
          npx cap add android

      # 9. Sync Capacitor
      - name: Sync Capacitor
        run: npx cap sync android

      # 10. FIX Java 21 → Java 17 (RESOLVE TEU ERRO FINAL)
      - name: Fix Android Java version
        run: |
          FILE="android/app/build.gradle"

          if [ -f "$FILE" ]; then
            sed -i 's/VERSION_21/VERSION_17/g' $FILE || true
            sed -i 's/jvmTarget = "21"/jvmTarget = "17"/g' $FILE || true
          fi

      # 11. Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 12. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LudoChaos-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
