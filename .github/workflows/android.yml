name: Build Android (APK + AAB Signed)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configurar o Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Configurar Java 21
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 4. Instalar as dependências (Node e Capacitor)
      - name: Install dependencies
        run: |
          npm install

      # 5. Preparar os web assets (index.html, css, js, etc.)
      - name: Prepare web assets
        run: |
          mkdir -p www
          cp -r index.html www/ || true
          cp -r css www/ || true
          cp -r js www/ || true
          cp -r assets www/ || true

      # 6. Inicializar o Capacitor de forma segura
      - name: Init Capacitor
        run: |
          if [ ! -f "capacitor.config.json" ]; then
            npx cap init "LudoChaos" "com.capessastudios.ludochaos" --web-dir="www"
          fi

      # 7. Forçar a recriação da pasta Android para garantir que o gradlew é gerado
      - name: Add Android Platform
        run: |
          rm -rf android
          npx cap add android

      # 8. Sincronizar o Capacitor com o projeto Android
      - name: Sync Capacitor
        run: npx cap sync android

      # 9. 🔥 GERAR OS ASSETS (Ícones e Splash Screen)
      - name: Generate Assets
        run: |
          if [ -d "resources" ]; then
            # Gera todos os assets (ícone e splash) baseados no que existir na pasta resources
            npx @capacitor/assets generate
          else
            echo "Aviso: Pasta resources não encontrada. Usando assets padrão."
          fi

      # 10. Restaurar a Keystore (Assinatura do APK/AAB)
      - name: Restore Keystore
        run: |
          mkdir -p keystores
          if [ -d "keystores" ]; then
            cp keystores/capessastudios-ludochaos.keystore release.keystore
          else
            echo "Aviso: Pasta 'keystores' não encontrada no repositório!"
            # Tenta copiar se estiver na raiz antiga
            cp capessastudios-ludochaos.keystore release.keystore || true
          fi

      # 11. 🔥 LIMPEZA DO GRADHE (IMPORTANTE PARA REFRESH DOS ÍCONES)
      - name: Gradle Clean
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean

      # 12. Compilação dos APKs (Debug e Release) e do AAB (Play Store)
      - name: Build APKs and AAB (Unsigned)
        run: |
          cd android
          ./gradlew assembleDebug
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      # 13. Assinatura Manual via APKSigner e Jarsigner (Garante o Signed)
      - name: Sign Release APK and AAB Manually
        run: |
          # Localiza as ferramentas de build do Android instaladas no runner do GitHub
          BUILD_TOOLS_VERSION=$(ls /usr/local/lib/android/sdk/build-tools/ | sort -V | tail -n 1)
          APKSIGNER_PATH="/usr/local/lib/android/sdk/build-tools/$BUILD_TOOLS_VERSION/apksigner"
          
          echo "Usando Android Build Tools versão: $BUILD_TOOLS_VERSION"
          
          # Encontra os ficheiros gerados pelo gradle
          UNSIGNED_APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          UNSIGNED_AAB=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          
          # Assina o APK
          if [ ! -z "$UNSIGNED_APK" ]; then
            echo "Assinando APK: $UNSIGNED_APK"
            $APKSIGNER_PATH sign --ks release.keystore \
              --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
              --ks-key-alias ${{ secrets.KEY_ALIAS }} \
              --key-pass pass:${{ secrets.KEY_PASSWORD }} \
              --out android/app/build/outputs/apk/release/LudoChaos-Signed.apk \
              $UNSIGNED_APK
          fi
          
          # Assina o AAB usando jarsigner (padrão para AAB)
          if [ ! -z "$UNSIGNED_AAB" ]; then
            echo "Assinando AAB: $UNSIGNED_AAB"
            jarsigner -keystore release.keystore \
              -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
              -keypass ${{ secrets.KEY_PASSWORD }} \
              $UNSIGNED_AAB ${{ secrets.KEY_ALIAS }}
            # Renomeia para indicar que está assinado
            cp $UNSIGNED_AAB android/app/build/outputs/bundle/release/LudoChaos-Signed.aab
          fi

      # 14. Upload do Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LudoChaos-Debug
          path: android/app/build/outputs/apk/debug/**/*.apk

      # 15. Upload do Release APK ASSINADO MANUALMENTE
      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: LudoChaos-Release-APK
          path: android/app/build/outputs/apk/release/*Signed.apk

      # 16. Upload do AAB ASSINADO MANUALMENTE
      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: LudoChaos-PlayStore-AAB
          path: android/app/build/outputs/bundle/release/*Signed.aab
